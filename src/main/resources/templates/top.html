<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quizアプリケーション</title>
    <!-- 画面を綺麗にするためのBootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- 🌐 上部ナビゲーション（クイズ追加・管理へのリンク） -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container justify-content-end gap-3">
            <a th:href="@{/quizFourChoices}" class="btn btn-sm btn-outline-light">4択クイズ追加</a>
            <a th:href="@{/quiz}" class="btn btn-sm btn-outline-light">2択クイズ追加</a>
        </div>
    </nav>

    <!-- 🏠 メインコンテンツエリア -->
    <div class="container text-center" style="margin-top: 100px; max-width: 600px;">
        
        <!-- タイトル（Quizアプリケーション） -->
        <h1 class="display-4 fw-bold text-secondary mb-5" th:text="${title}">Quizアプリケーション</h1>

        <!-- 🎮 プレイ開始ボタンエリア -->
        <div class="row g-4 justify-content-center mt-4">
            <!-- 2択プレイボタン -->
            <div class="col-6 col-sm-5">
                <a th:href="@{/quiz/play}" class="btn btn-lg btn-primary w-100 py-4 shadow-sm fw-bold fs-4">2択</a>
            </div>
            
            <!-- 4択プレイボタン（後ほどプレイ用コントローラーを作ったらここへ繋ぎます） -->
            <div class="col-6 col-sm-5">
                <a th:href="@{/quizFourChoices/play}" class="btn btn-lg btn-info text-white w-100 py-4 shadow-sm fw-bold fs-4">4択</a>
            </div>
        </div>
    </div>

</body>
</html>
