<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>「〇×クイズ」アプリ：CRUD</title>
	<!-- Bootstrap 5 -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

	<div class="container" style="margin-top: 50px; max-width: 900px;">

		<!-- タイトルエリア -->
		<div class="mb-4 text-start">
			<h1 class="display-5 fw-bold text-dark m-0">「〇×」2択クイズ</h1>
			<p class="fs-5 text-muted mt-2" th:text="${title}">タイトル</p>
		</div>

		<!-- 完了・エラー系メッセージ（上部に綺麗に配置） -->
		<div th:if="${complete}" class="alert alert-success py-3 shadow-sm fw-bold text-start" th:text="${complete}">
		</div>
		<div th:if="${delcomplete}" class="alert alert-info py-3 shadow-sm fw-bold text-start" th:text="${delcomplete}">
		</div>
		<div th:if="${msg}" class="alert alert-danger py-3 shadow-sm fw-bold text-start" th:text="${msg}"></div>

		<!-- 登録・更新フォーム（4択クイズと同じ美しいカード型デザイン） -->
		<div class="card shadow-sm border-0 mb-5 bg-white">
			<div class="card-body p-4 p-md-5">
				<h2 class="fs-4 fw-bold text-secondary-emphasis mb-4 text-start border-bottom pb-2">
					<span th:text="${quizForm.newQuiz} ? '📝 クイズの新規登録' : '🔄 クイズの編集・更新'">フォームタイトル</span>
				</h2>

				<form method="POST" th:action="${quizForm.newQuiz} ? @{/quiz/insert} : @{/quiz/update}"
					th:object="${quizForm}">

					<!-- クイズの内容 -->
					<div class="mb-4 text-start">
						<label class="form-label fw-bold text-dark">クイズの内容（問題文）</label>
						<textarea class="form-control" rows="4" th:field="*{question}"
							th:classappend="${#fields.hasErrors('question')} ? 'is-invalid' : ''"
							placeholder="問題文を入力してください"></textarea>
						<div class="invalid-feedback fw-bold" th:errors="*{question}"></div>
					</div>

					<!-- クイズの解答（ラジオボタンを大きく押しやすく） -->
					<div class="mb-4 text-start">
						<label class="form-label fw-bold text-dark d-block">クイズの解答</label>
						<div class="form-check form-check-inline me-4">
							<input class="form-check-input fs-5" type="radio" value="true" th:field="*{answer}"
								id="radioTrue">
							<label class="form-check-label fs-5 fw-bold text-success" for="radioTrue">⭕ 「〇」</label>
						</div>
						<div class="form-check form-check-inline">
							<input class="form-check-input fs-5" type="radio" value="false" th:field="*{answer}"
								id="radioFalse">
							<label class="form-check-label fs-5 fw-bold text-danger" for="radioFalse">❌ 「×」</label>
						</div>
						<div th:if="${#fields.hasErrors('answer')}" class="text-danger small fw-bold mt-1"
							th:errors="*{answer}"></div>
					</div>

					<!--作成者 -->
					<div class="mb-4 text-start">
						<label class="form-label fw-bold text-dark">作成者</label>
						<input type="text" class="form-control" th:field="*{author}"
							th:classappend="${#fields.hasErrors('author')} ? 'is-invalid' : ''"
							style="max-width: 300px;" placeholder="お名前を入力">
						<div class="invalid-feedback fw-bold" th:errors="*{author}"></div>
					</div>

					<!-- 隠しID（更新用） -->
					<input th:if="${id}" type="hidden" th:field="*{id}">

					<!-- 送信ボタン -->
					<div class="text-start pt-2">
						<button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm fw-bold"
							th:text="${quizForm.newQuiz} ? '登録する' : '更新する'">送信</button>
					</div>
				</form>
			</div>
		</div>
		
		<!-- CSV一括登録カード -->
		<div class="card shadow-sm border-0 rounded-3 mb-4">
		    <div class="card-body p-4">
		        <h5 class="fw-bold mb-3">
		            <i class="bi bi-file-earmark-arrow-up text-primary me-2"></i>CSVからまとめて登録
		        </h5>
		        
		        <!-- 非同期（API）送信用のフォーム -->
		        <form id="csvUploadForm" class="row g-3 align-items-center">
		            <div class="col-auto flex-grow-1">
		                <input type="file" id="csvFile" name="file" accept=".csv" class="form-control" required>
		            </div>
		            <div class="col-auto">
		                <button type="button" onclick="uploadCsvApi()" class="btn btn-success fw-bold px-4">
		                    <i class="bi bi-upload me-1"></i> CSV登録
		                </button>
		            </div>
		        </form>

		        <!-- APIからの結果メッセージ表示エリア -->
		        <div id="apiMessage" class="mt-3 d-none"></div>
		    </div>
		</div>

		<!--  下部エリア：一覧表示（新規登録時のみ表示） -->
		<div th:if="${quizForm.newQuiz}">

			<div class="card shadow-sm border-0 mb-5 bg-white">
				<div class="card-body p-4">
					<!--プレイリンクを完全に排除し、スッキリしたタイトルに -->
					<h2 class="fs-4 fw-bold text-secondary-emphasis mb-4 text-start">登録クイズ一覧</h2>

					<!-- クイズ情報が1件でもあれば表示 -->
					<div class="table-responsive" th:unless="${#lists.isEmpty(list)}">
						<table class="table table-hover align-middle m-0">
							<thead class="table-light">
								<tr>
									<th style="width: 10%;">ID</th>
									<th style="width: 50%;">内容</th>
									<th style="width: 12%;" class="text-center">解答</th>
									<th style="width: 14%;">作成者</th>
									<th style="width: 14%;" class="text-center">操作</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="obj : ${list}">
									<td class="fw-bold text-secondary" th:text="${obj.id}"></td>
									<td class="text-start fw-semibold text-wrap" th:text="${obj.question}"></td>
									<td class="text-center fs-5">
										<span th:if="${obj.answer == true}" class="text-success fw-bold">⭕</span>
										<span th:if="${obj.answer == false}" class="text-danger fw-bold">❌</span>
									</td>
									<td class="text-muted small" th:text="${obj.author}"></td>
									<td class="text-center">
										<div class="d-flex gap-2 justify-content-center">
											<!-- 編集ボタン -->
											<form method="GET" th:action="@{/quiz/{id}(id=${obj.id})}">
												<button type="submit"
													class="btn btn-sm btn-outline-secondary fw-bold px-3">編集</button>
											</form>
											<!-- 削除ボタン -->
											<form method="POST" th:action="@{/quiz/delete}">
												<input type="hidden" name="id" th:value="${obj.id}">
												<button type="submit" class="btn btn-sm btn-outline-danger fw-bold px-3"
													onclick="return confirm('本当に削除しますか？');">削除</button>
											</form>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>

					<!-- クイズ情報が1件もない場合表示 -->
					<p class="text-muted py-4 m-0 fs-5 fw-bold" th:if="${#lists.isEmpty(list)}">登録されているクイズはありません。</p>
				</div>
			</div>
		</div>

		<!--  編集モードの時だけ出現する「CRUD画面へ戻る」リンク -->
		<div class="mt-4 pt-4 border-top text-center mb-5" th:unless="${quizForm.newQuiz}">
			<a th:href="@{/quiz}" class="btn btn-link text-secondary text-decoration-none fw-bold">CRUD画面へ戻る</a>
		</div>

		<!--  いつでもトップへ戻れるリンク -->
		<div class="mt-4 pt-2 text-center mb-5" th:if="${quizForm.newQuiz}">
			<a th:href="@{/}" class="text-secondary text-decoration-none">アプリのトップページに戻る</a>
		</div>
	</div>

	<!--JavaScript (API通信処理) -->
	<script th:src="@{/js/quiz.js}"></script>
</body>

</html>
